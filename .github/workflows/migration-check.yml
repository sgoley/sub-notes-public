name: Migration Check

on:
  push:
    branches: [main]
    paths:
      - 'pocketbase/migrations/**'
  pull_request:
    branches: [main]
    paths:
      - 'pocketbase/migrations/**'

jobs:
  syntax-check:
    name: Validate migration files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JS syntax
        run: |
          for f in pocketbase/migrations/*.js; do
            echo "Checking $f"
            node --check "$f"
          done
