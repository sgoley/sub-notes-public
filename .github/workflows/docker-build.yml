name: Docker Build

on:
  push:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'backend/**'
      - 'pocketbase/**'
  pull_request:
    branches: [main]
    paths:
      - 'Dockerfile*'
      - 'docker-compose.yml'
      - 'nginx/**'
      - 'backend/**'
      - 'pocketbase/**'

jobs:
  build:
    name: Build all Docker images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create minimal .env for build
        run: |
          cat <<'EOF' > .env
          PB_ADMIN_EMAIL=admin@example.com
          PB_ADMIN_PASSWORD=changeme123
          YOUTUBE_API_KEY=placeholder
          GEMINI_API_KEY=placeholder
          EOF

      - name: Build images
        run: docker compose build
